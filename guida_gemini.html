<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guida Pratica a Gemini — Per Docenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1117;--ink-mid:#1c2030;--gold:#c9a84c;--gold-pale:#e8cc80;
  --cream:#f5f0e6;--muted:#8a8d99;--border:rgba(201,168,76,.18);--border-dim:rgba(201,168,76,.09);
  --navy:#1a2744;
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;font-weight:300;background:var(--ink);color:var(--cream);display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.header{
  background:rgba(15,17,23,.95);border-bottom:1px solid var(--border-dim);
  padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);flex-shrink:0;
}
.header-left{display:flex;align-items:center;gap:18px}
.back-btn{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);text-decoration:none;
  border:1px solid rgba(201,168,76,.3);padding:5px 12px;border-radius:2px;
  white-space:nowrap;transition:background .2s,color .2s;
}
.back-btn:hover{background:rgba(201,168,76,.1)}
.header-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--cream)}
.header-sub{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.1em;color:var(--muted);margin-top:2px}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;height:calc(100vh - 57px)}

/* SIDEBAR */
.sidebar{
  width:240px;flex-shrink:0;background:#13151e;
  border-right:1px solid var(--border-dim);overflow-y:auto;padding:20px 0;
}
.sidebar-label{
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);padding:0 20px;margin-bottom:12px;display:block;
}
.nav-btn{
  width:100%;background:none;border:none;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:300;
  transition:background .15s,color .15s;text-align:left;border-left:2px solid transparent;
}
.nav-btn:hover{background:rgba(201,168,76,.05);color:var(--cream)}
.nav-btn.active{background:rgba(201,168,76,.08);color:var(--cream);border-left-color:var(--gold)}
.nav-num{
  font-family:'DM Mono',monospace;font-size:.65rem;color:var(--gold);
  min-width:22px;font-weight:500;
}
.nav-btn span{display:flex;flex-direction:column;gap:1px}
.nav-sub{font-size:.7rem;color:var(--muted);font-weight:300;display:block}

/* CONTENT */
.content{flex:1;overflow-y:auto;background:var(--ink)}
.inner{max-width:760px;margin:0 auto;padding:36px 32px 80px}

/* CONTENT ELEMENTS */
.section-title{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border-dim)}
.section-num{
  font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold);
  line-height:1;min-width:40px;
}
.section-title h2{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--cream)}
p{font-size:.92rem;color:rgba(245,240,230,.8);line-height:1.75;margin-bottom:16px}
p strong{color:var(--cream);font-weight:500}
p em{color:var(--gold-pale);font-style:italic}

.info-box{
  background:rgba(201,168,76,.06);border:1px solid var(--border);
  border-radius:2px;padding:16px 20px;margin:16px 0;
}
.info-box.green{background:rgba(112,208,160,.05);border-color:rgba(112,208,160,.2)}
.info-box.yellow{background:rgba(232,204,128,.05);border-color:rgba(232,204,128,.2)}
.info-box-title{font-weight:500;color:var(--gold);font-size:.82rem;margin-bottom:6px;font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
.info-box.green .info-box-title{color:#70d0a0}
.info-box.yellow .info-box-title{color:var(--gold-pale)}
.info-box-text{font-size:.85rem;color:rgba(245,240,230,.75);line-height:1.65}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
.card{
  background:var(--ink-mid);border:1px solid var(--border-dim);
  border-radius:2px;padding:16px;transition:border-color .2s;
}
.card:hover{border-color:var(--border)}
.card.blue-top{border-top:2px solid #7090e8}
.card.gold-top{border-top:2px solid var(--gold)}
.card.green-top{border-top:2px solid #70d0a0}
.card-title{font-weight:500;color:var(--cream);font-size:.88rem;margin-bottom:4px}
.card-desc{font-size:.78rem;color:var(--muted);line-height:1.55}

.step{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start}
.step-num{
  width:28px;height:28px;border-radius:2px;background:rgba(201,168,76,.12);border:1px solid var(--border);
  color:var(--gold);font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
}
.step-title{font-weight:500;color:var(--cream);font-size:.9rem;margin-bottom:3px}
.step-text{font-size:.82rem;color:var(--muted);line-height:1.6}

/* CHAT EXAMPLES */
.chat-area{background:#13151e;border:1px solid var(--border-dim);border-radius:2px;padding:18px;margin:16px 0}
.chat-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.badge{font-size:.6rem;padding:3px 8px;border-radius:2px;font-weight:500;background:rgba(112,144,232,.2);color:#9ab0f0;font-family:'DM Mono',monospace;letter-spacing:.1em}
.bubble-wrap{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px}
.bubble-wrap.user{flex-direction:row-reverse}
.bubble{font-size:.82rem;line-height:1.6;padding:10px 14px;border-radius:2px;max-width:80%}
.bubble.user{background:rgba(201,168,76,.12);color:var(--cream);border:1px solid rgba(201,168,76,.2)}
.bubble.claude{background:var(--ink-mid);color:rgba(245,240,230,.85);border:1px solid var(--border-dim)}
.avatar{width:28px;height:28px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;flex-shrink:0}
.avatar.user{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid var(--border)}
.avatar.claude{background:rgba(112,144,232,.15);color:#9ab0f0;border:1px solid rgba(112,144,232,.2)}

/* PLANS */
.plan{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:16px}
.plan-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:4px}
.plan-price{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--muted);margin-bottom:12px;display:block}
.plan-feat{font-size:.78rem;color:rgba(245,240,230,.75);padding:3px 0;display:flex;gap:8px;align-items:flex-start;line-height:1.4}
.plan-best{font-size:.72rem;margin-top:12px;padding:6px 10px;border-radius:2px;font-family:'DM Mono',monospace;letter-spacing:.04em}

/* COMPARE TABLE */
.compare{border:1px solid var(--border-dim);border-radius:2px;overflow:hidden;margin:16px 0}
.compare-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;background:#13151e;border-bottom:1px solid var(--border-dim)}
.compare-hcell{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);padding:10px 12px}
.compare-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr}
.compare-row.even{background:rgba(255,255,255,.02)}
.compare-feat{font-size:.8rem;color:var(--cream);padding:9px 12px}
.compare-val{font-size:.85rem;padding:9px 12px;text-align:center}
.compare-note{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);padding:8px 12px;border-top:1px solid var(--border-dim);background:#13151e}

/* FEAT CARDS */
.feat-card{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:16px;margin-bottom:10px;transition:border-color .2s}
.feat-card:hover{border-color:var(--border)}
.feat-head{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.feat-title{font-weight:500;color:var(--cream);font-size:.9rem}
.feat-desc{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:8px}
.feat-tip{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--gold);background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.15);padding:6px 10px;border-radius:2px}

/* PROMPT BOX */
.prompt-box{background:#13151e;border:1px solid var(--border-dim);border-radius:2px;margin:14px 0;overflow:hidden}
.prompt-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:8px 14px;border-bottom:1px solid var(--border-dim);display:flex;justify-content:space-between;align-items:center}
.prompt-text{font-family:'DM Mono',monospace;font-size:.78rem;color:rgba(245,240,230,.8);padding:12px 14px;line-height:1.7;white-space:pre-wrap}
.copy-btn{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;padding:4px 10px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--gold);cursor:pointer;transition:background .2s}
.copy-btn:hover{background:rgba(201,168,76,.1)}
.copy-btn.copied{background:rgba(112,208,160,.1);border-color:rgba(112,208,160,.3);color:#70d0a0}

/* PROJECTS */
.project-list{display:flex;flex-direction:column;gap:10px;margin:14px 0}
.project-item{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:14px;display:flex;align-items:center;gap:12px}
.project-icon{font-size:1.2rem}
.project-name{font-size:.88rem;font-weight:500;color:var(--cream)}
.project-desc{font-size:.75rem;color:var(--muted);margin-top:2px}

/* COMPARISON TABLE (chat vs project) */
.vs-table{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.vs-col{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;overflow:hidden}
.vs-head{padding:10px 14px;font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;border-bottom:1px solid var(--border-dim)}
.vs-row{padding:8px 14px;font-size:.78rem;color:rgba(245,240,230,.75);border-bottom:1px solid rgba(255,255,255,.03);line-height:1.5}

/* NAV FOOTER */
.nav-footer{display:flex;justify-content:space-between;align-items:center;margin-top:40px;padding-top:24px;border-top:1px solid var(--border-dim)}
.nav-prev,.nav-next{background:transparent;border:1px solid var(--border);color:var(--gold);font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.08em;padding:9px 18px;border-radius:2px;cursor:pointer;transition:background .2s}
.nav-prev:hover,.nav-next:hover{background:rgba(201,168,76,.08)}
.nav-prev:disabled,.nav-next:disabled{opacity:.3;cursor:default}
.nav-counter{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.1em}

@media(max-width:700px){
  .layout{flex-direction:column;height:auto;overflow:visible}
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border-dim);overflow-x:auto;white-space:nowrap;display:flex;padding:10px 0;gap:0}
  .nav-btn{display:inline-flex;flex-direction:column;width:auto;min-width:80px;padding:8px 14px;font-size:.75rem;border-left:none;border-bottom:2px solid transparent}
  .nav-btn.active{border-left:none;border-bottom-color:var(--gold)}
  .sidebar-label{display:none}
  .content{height:auto}
  .inner{padding:24px 16px 60px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="index.html" class="back-btn">← Home</a>
    <div>
      <div class="header-title">Guida Pratica a Gemini</div>
      <div class="header-sub">Per docenti di scuola secondaria · Con integrazione Google Workspace</div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <span class="sidebar-label">Contenuti</span>
    <button class="nav-btn active" onclick="goTo(0)"><span class="nav-num">01</span><span>Cos'è Gemini<span class="nav-sub">Introduzione</span></span></button>
    <button class="nav-btn" onclick="goTo(1)"><span class="nav-num">02</span><span>Come iniziare<span class="nav-sub">Accesso e piani</span></span></button>
    <button class="nav-btn" onclick="goTo(2)"><span class="nav-num">03</span><span>La Chat<span class="nav-sub">Come funziona</span></span></button>
    <button class="nav-btn" onclick="goTo(3)"><span class="nav-num">04</span><span>Google Workspace<span class="nav-sub">Docs, Drive, Gmail</span></span></button>
    <button class="nav-btn" onclick="goTo(4)"><span class="nav-num">05</span><span>Funzionalità<span class="nav-sub">Multimodale, Gems</span></span></button>
    <button class="nav-btn" onclick="goTo(5)"><span class="nav-num">06</span><span>Prompt efficaci<span class="nav-sub">Formula e esempi</span></span></button>
    <button class="nav-btn" onclick="goTo(6)"><span class="nav-num">07</span><span>Chat vs Workspace<span class="nav-sub">Quando usare cosa</span></span></button>
  </div>
  <div class="content">
    <div class="inner" id="main-content"></div>
  </div>
</div>



<script>

let current = 0;

const sections = [

// 0 — Cos'è Gemini
`<div class="section-title"><div class="section-num">1</div><h2>Cos'è Gemini</h2></div>
<p><strong>Gemini</strong> è il modello di intelligenza artificiale sviluppato da <strong>Google DeepMind</strong>. Nato come evoluzione di Bard, Gemini è progettato per essere <em>nativamente multimodale</em>: comprende e genera testo, immagini, audio e codice in modo integrato. Il suo punto di forza principale per i docenti è la <strong>profonda integrazione con Google Workspace</strong> — Docs, Drive, Gmail, Meet e Classroom.</p>
<div class="info-box"><div class="info-box-title">Perché Gemini è rilevante per i docenti?</div><div class="info-box-text">Se usi già Google Classroom, Drive o Docs nella tua scuola, Gemini si inserisce direttamente nei tuoi strumenti esistenti: non devi cambiare applicazione, non devi copiare e incollare. Lavori dentro i tuoi documenti, con la tua programmazione già caricata, e l'AI ti assiste in modo contestuale.</div></div>
<div class="grid2">
  <div class="card blue-top"><div class="card-title">Integrazione Workspace</div><div class="card-desc">Funziona direttamente in Docs, Drive, Gmail, Slides e Meet senza uscire dalla suite Google</div></div>
  <div class="card blue-top"><div class="card-title">Multimodalità</div><div class="card-desc">Analizza testi, immagini, tabelle, PDF e audio nella stessa conversazione</div></div>
  <div class="card blue-top"><div class="card-title">Ricerca web in tempo reale</div><div class="card-desc">Accesso diretto a Google Search: risposte aggiornate con fonti citate</div></div>
  <div class="card blue-top"><div class="card-title">Gems — Assistenti personalizzati</div><div class="card-desc">Crea assistenti AI configurati per la tua materia o classe, riutilizzabili nel tempo</div></div>
</div>
<div class="info-box yellow"><div class="info-box-title">Differenza rispetto a Claude e ChatGPT</div><div class="info-box-text">Claude eccelle nella qualità della prosa e nel ragionamento su testi lunghi. ChatGPT ha un ecosistema di plugin e la generazione immagini. Gemini si distingue per l'integrazione con l'ecosistema Google: se la tua scuola usa G Suite, Gemini è lo strumento che riduce maggiormente il cambio di contesto nel lavoro quotidiano.</div></div>`,

// 1 — Come iniziare
`<div class="section-title"><div class="section-num">2</div><h2>Come iniziare</h2></div>
<p>Gemini è accessibile da browser su qualsiasi dispositivo. Se hai già un account Google — personale o scolastico — sei a due minuti dall'inizio.</p>
<div class="step"><div class="step-num">1</div><div><div class="step-title">Vai su gemini.google.com</div><div class="step-text">Apri il browser e digita <strong>gemini.google.com</strong>. Il sito è disponibile in italiano. In alternativa, accedi direttamente da Docs, Drive o Gmail tramite il pulsante Gemini nella barra laterale.</div></div></div>
<div class="step"><div class="step-num">2</div><div><div class="step-title">Accedi con il tuo account Google</div><div class="step-text">Usa il tuo account Gmail personale o, se disponibile, l'account Google della scuola (<em>@nomescuola.edu.it</em>). Non è necessaria una registrazione separata.</div></div></div>
<div class="step"><div class="step-num">3</div><div><div class="step-title">Scegli il piano più adatto</div><div class="step-text">Il piano <strong>Gemini Free</strong> è sufficiente per iniziare. Per le funzionalità avanzate e l'integrazione completa con Workspace, valuta <strong>Gemini Advanced</strong> (incluso in Google One AI Premium, circa 22 €/mese) oppure i piani <strong>Google Workspace for Education</strong> dedicati alle scuole.</div></div></div>
<div class="step"><div class="step-num">4</div><div><div class="step-title">Attiva Gemini in Workspace (se disponibile)</div><div class="step-text">Se la tua scuola ha un account Google Workspace for Education, l'amministratore IT può attivare le funzionalità Gemini per tutti i docenti. Verifica con il referente informatico del tuo istituto.</div></div></div>
<div class="plans-grid">
  <div class="plan-card" style="border-top:3px solid #64748b">
    <div class="plan-name" style="color:#64748b">Free</div>
    <div class="plan-price">Gratuito</div>
    <div class="plan-feat"><span style="color:#64748b">·</span>Gemini 1.5 Flash</div>
    <div class="plan-feat"><span style="color:#64748b">·</span>Chat testuale e multimodale</div>
    <div class="plan-feat"><span style="color:#64748b">·</span>Ricerca web integrata</div>
    <div class="plan-feat"><span style="color:#64748b">·</span>Generazione immagini (Imagen 3)</div>
    <div class="plan-feat"><span style="color:#64748b">·</span>Limite messaggi giornalieri</div>
    <div class="plan-best" style="background:#64748b14;color:#64748b">Ideale per: iniziare e sperimentare</div>
  </div>
  <div class="plan-card" style="border-top:3px solid #1a73e8">
    <div class="plan-name" style="color:#1a73e8">Advanced</div>
    <div class="plan-price">~22 €/mese (Google One AI Premium)</div>
    <div class="plan-feat"><span style="color:#1a73e8">·</span>Gemini 1.5 Pro (modello più potente)</div>
    <div class="plan-feat"><span style="color:#1a73e8">·</span>Contesto esteso: fino a 1 milione di token</div>
    <div class="plan-feat"><span style="color:#1a73e8">·</span>Gems: assistenti personalizzati</div>
    <div class="plan-feat"><span style="color:#1a73e8">·</span>Integrazione profonda Workspace</div>
    <div class="plan-feat"><span style="color:#1a73e8">·</span>Messaggi illimitati</div>
    <div class="plan-best" style="background:#1a73e814;color:#1a73e8">Ideale per: uso professionale quotidiano</div>
  </div>
  <div class="plan-card" style="border-top:3px solid #0f766e">
    <div class="plan-name" style="color:#0f766e">Workspace for Education</div>
    <div class="plan-price">Gratuito o a tariffa scolastica</div>
    <div class="plan-feat"><span style="color:#0f766e">·</span>Account gestito dall'istituto</div>
    <div class="plan-feat"><span style="color:#0f766e">·</span>Controllo admin centralizzato</div>
    <div class="plan-feat"><span style="color:#0f766e">·</span>Dati NON usati per training</div>
    <div class="plan-feat"><span style="color:#0f766e">·</span>GDPR e conformità EU</div>
    <div class="plan-feat"><span style="color:#0f766e">·</span>Google Classroom integrato</div>
    <div class="plan-best" style="background:#0f766e14;color:#0f766e">Ideale per: istituti e reti di scuole</div>
  </div>
  <div class="plan-card" style="border-top:3px solid #5C3D0E">
    <div class="plan-name" style="color:#5C3D0E">Enterprise</div>
    <div class="plan-price">Su preventivo</div>
    <div class="plan-feat"><span style="color:#5C3D0E">·</span>Tutto il piano Workspace</div>
    <div class="plan-feat"><span style="color:#5C3D0E">·</span>DPA dedicato e audit log</div>
    <div class="plan-feat"><span style="color:#5C3D0E">·</span>Gemini for Workspace avanzato</div>
    <div class="plan-feat"><span style="color:#5C3D0E">·</span>Supporto prioritario dedicato</div>
    <div class="plan-best" style="background:#5C3D0E14;color:#5C3D0E">Ideale per: reti di istituti e USR</div>
  </div>
</div>
<div class="info-box green"><div class="info-box-title">Nota per le scuole italiane</div><div class="info-box-text">Molte scuole italiane hanno già un contratto Google Workspace for Education Fundamentals (gratuito). In questo caso, l'attivazione di Gemini dipende dall'amministratore IT dell'istituto. Verifica prima di acquistare un piano personale a pagamento.</div></div>`,

// 2 — La Chat
`<div class="section-title"><div class="section-num">3</div><h2>La Chat</h2></div>
<p>L'interfaccia principale di Gemini su <strong>gemini.google.com</strong> funziona come una conversazione. Scrivi un messaggio, Gemini risponde, puoi continuare a raffinare. La differenza rispetto ad altri chatbot è la possibilità di allegare immagini, file da Drive e attivare la ricerca web in tempo reale direttamente nella chat.</p>

// 3 — Google Workspace
`<div class="section-title"><div class="section-num">4</div><h2>Google Workspace — Il punto di forza di Gemini</h2></div>
<p>L'integrazione con <strong>Google Workspace</strong> è il vantaggio competitivo di Gemini rispetto agli altri chatbot. Non devi uscire da Docs per chiedere aiuto: Gemini legge il documento su cui stai lavorando e ti assiste direttamente.</p>

<div class="ws-card">
  <div class="ws-head" style="background:#1a73e8">Gemini in Google Docs</div>
  <div class="ws-body">Apri un documento in Docs e clicca sul pulsante Gemini nella barra laterale (o premi <strong>@Gemini</strong> nel testo). Puoi chiedere a Gemini di riassumere il documento aperto, migliorare un paragrafo selezionato, espandere un'idea, cambiare tono o creare un indice automatico — tutto senza copiare e incollare nulla.</div>
  <div class="ws-example">Esempio pratico: apri la tua programmazione annuale in Docs → chiedi a Gemini «Crea le schede UDA per il primo quadrimestre basandoti su questo documento» → il testo generato viene inserito direttamente nel documento.</div>
</div>

<div class="ws-card">
  <div class="ws-head" style="background:#34a853">Gemini in Google Drive</div>
  <div class="ws-body">Da Drive puoi chiedere a Gemini di cercare tra i tuoi file e riassumere documenti senza aprirli. Digita una domanda nella barra di ricerca di Drive preceduta da «Chiedi a Gemini» per ottenere risposte basate sui contenuti dei tuoi file — programmi, verbali, relazioni — tutti indicizzati automaticamente.</div>
  <div class="ws-example">Esempio pratico: «Cerca tra i miei file il piano di lavoro del docente di informatica del 2023-24 e riassumi gli obiettivi del secondo quadrimestre.»</div>
</div>

<div class="ws-card">
  <div class="ws-head" style="background:#ea4335">Gemini in Gmail</div>
  <div class="ws-body">Gemini può riassumere lunghe catene di email, suggerire una risposta appropriata al contesto, e aiutarti a scrivere comunicazioni formali (lettere ai genitori, convocazioni, circolari) a partire da poche indicazioni. Trovi il pulsante Gemini direttamente nell'interfaccia di Gmail.</div>
  <div class="ws-example">Esempio pratico: seleziona una lunga email di un genitore → «Riassumi questa email in tre punti e suggerisci una risposta professionale che spieghi le procedure di recupero.»</div>
</div>

<div class="ws-card">
  <div class="ws-head" style="background:#fbbc04;color:#1e293b">Gemini in Google Classroom</div>
  <div class="ws-body">Nelle versioni Workspace for Education, Gemini può assistere nella creazione di compiti, nella formulazione di rubriche di valutazione e nella generazione di feedback personalizzati sulle consegne degli studenti. Il docente mantiene sempre il controllo prima della pubblicazione.</div>
  <div class="ws-example">Esempio pratico: nel pannello docente di Classroom → «Crea una rubrica per valutare la relazione di laboratorio su [argomento] con 4 livelli e indicatori osservabili.»</div>
</div>

<div class="info-box red"><div class="info-box-title">Attenzione alla privacy con account personali</div><div class="info-box-text">Con un account Google <strong>personale</strong>, i dati condivisi con Gemini potrebbero essere usati per migliorare i modelli Google. Per dati sensibili (nomi di studenti, valutazioni, documenti riservati) usa esclusivamente un account <strong>Google Workspace for Education</strong> gestito dall'istituto, che garantisce il non utilizzo dei dati per il training.</div></div>`,

// 5 — Prompt efficaci
`<div class="section-title"><div class="section-num">6</div><h2>Prompt efficaci — La formula che funziona</h2></div>
<p>Come per qualsiasi chatbot AI, la qualità dell'output dipende dalla qualità dell'input. Con Gemini, il contesto di <em>dove</em> stai lavorando (in Docs, in Drive, nella chat libera) influenza molto il modo ottimale di formulare il prompt.</p>
<div style="background:#e8f0fe;border-radius:10px;padding:16px;margin-bottom:20px;border:1px solid #93c5fd">
  <div style="font-weight:700;color:#1a73e8;font-size:14px;margin-bottom:10px">Formula base di un prompt efficace</div>
  <div class="formula-row"><div><span class="tag">Ruolo</span><span style="font-size:13px;color:#6b7280">«Sei un esperto di didattica della matematica...»</span></div></div>
  <div class="formula-row"><div><span class="tag">Obiettivo</span><span style="font-size:13px;color:#6b7280">«Crea una verifica strutturata su...»</span></div></div>
  <div class="formula-row"><div><span class="tag">Destinatari</span><span style="font-size:13px;color:#6b7280">«Per una classe 2ª di liceo scientifico...»</span></div></div>
  <div class="formula-row"><div><span class="tag">Struttura</span><span style="font-size:13px;color:#6b7280">«Includi: 3 esercizi a risposta aperta, 1 problema, griglia di valutazione»</span></div></div>
  <div class="formula-row"><div><span class="tag">Vincoli</span><span style="font-size:13px;color:#6b7280">«Tempo: 1 ora. Totale: 30 punti. Tono: formale ma accessibile.»</span></div></div>
</div>
<div style="font-weight:700;color:#1e293b;font-size:15px;margin-bottom:14px">Prompt pronti — copia e adatta</div>
<div class="prompt-box">
  <div class="prompt-top"><span class="prompt-label">Piano lezione in Docs</span><button class="copy-btn" onclick="copyPrompt(this)">Copia</button></div>
  <div class="prompt-text">Sei un esperto di didattica. Crea una lezione di 50 minuti su [argomento] per una classe [livello].
Struttura:
- Obiettivi di apprendimento (3 obiettivi in formato "Lo studente sarà in grado di...")
- Attività di apertura / aggancio (5 min)
- Spiegazione con esempi concreti (25 min)
- Attività pratica guidata (15 min)
- Verifica di comprensione / exit ticket (5 min)
Tono: accessibile, con analogie concrete. Includi domande da fare alla classe.</div>
</div>
<div class="prompt-box">
  <div class="prompt-top"><span class="prompt-label">Feedback su consegna studente</span><button class="copy-btn" onclick="copyPrompt(this)">Copia</button></div>
  <div class="prompt-text">Sei un docente esperto. Leggi la seguente consegna di uno studente di [livello] su [argomento] e fornisci un feedback formativo.
[incolla qui la consegna dello studente]

Il feedback deve:
- Iniziare con un aspetto positivo concreto
- Indicare 2 aree di miglioramento specifiche con esempi
- Suggerire una revisione concreta per il punto più critico
- Concludere con un incoraggiamento
Tono: costruttivo, professionale, non giudicante. Max 150 parole.</div>
</div>
<div class="prompt-box">
  <div class="prompt-top"><span class="prompt-label">Email ai genitori</span><button class="copy-btn" onclick="copyPrompt(this)">Copia</button></div>
  <div class="prompt-text">Sei un docente di scuola secondaria. Scrivi una comunicazione formale ai genitori di una classe [livello] per informarli di [situazione/comunicazione].

Dettagli:
- Argomento: [descrivi la situazione]
- Tono: professionale, chiaro, non allarmistico
- Struttura: saluto, contesto, informazione principale, azioni richieste ai genitori, chiusura formale
- Lunghezza: max 200 parole
- Firma: Prof./Prof.ssa [cognome], [materia]</div>
</div>
<div class="prompt-box">
  <div class="prompt-top"><span class="prompt-label">Adattamento per DSA</span><button class="copy-btn" onclick="copyPrompt(this)">Copia</button></div>
  <div class="prompt-text">Adatta il seguente testo per uno studente con dislessia di classe [livello]:
[incolla qui il testo originale]

Criteri di adattamento:
- Frasi brevi (max 20 parole)
- Parole chiave in grassetto
- Sostituisci termini tecnici con spiegazioni semplici
- Aggiungi uno schema visivo riassuntivo alla fine
- Crea un glossario con i 5 termini più importanti</div>
</div>`,

function goTo(n) {
  current = n;
  document.getElementById('main-content').innerHTML = sections[n] + navFooter();
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === n));
  document.querySelector('.content').scrollTop = 0;
}

function navFooter() {
  return `<div class="nav-footer">
    <button class="nav-prev" onclick="goTo(${current-1})" ${current===0?'disabled':''}>← Precedente</button>
    <span class="nav-counter">${current+1} / ${sections.length}</span>
    <button class="nav-next" onclick="goTo(${current+1})" ${current===sections.length-1?'disabled':''}>Successivo →</button>
  </div>`;
}

function copyPrompt(btn) {
  const text = btn.closest('.prompt-box').querySelector('.prompt-text').innerText;
  navigator.clipboard.writeText(text);
  btn.textContent = 'Copiato';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copia'; btn.classList.remove('copied'); }, 2000);
}

goTo(0);

</script>
