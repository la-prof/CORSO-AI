<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI nella Didattica — Lezione Laboratoriale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1117;--ink-mid:#1c2030;--gold:#c9a84c;--gold-pale:#e8cc80;
  --cream:#f5f0e6;--muted:#8a8d99;--border:rgba(201,168,76,.18);--border-dim:rgba(201,168,76,.09);
  /* kept for JS compatibility */
  --navy:#1a2744;--gold-light:#e8cc80;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;font-weight:300;background:var(--ink);color:var(--cream);display:flex;flex-direction:column}

/* HEADER */
.header{
  background:rgba(15,17,23,.96);border-bottom:1px solid var(--border-dim);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:52px;flex-shrink:0;
  position:relative;z-index:10;
}
.h-left{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--cream)}
.h-right{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--muted)}
.h-count{
  font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.08em;
  color:var(--gold);background:rgba(201,168,76,.1);border:1px solid var(--border);
  padding:4px 12px;border-radius:2px;
}
.back-btn{
  font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gold);text-decoration:none;border:1px solid rgba(201,168,76,.3);
  padding:5px 12px;border-radius:2px;white-space:nowrap;transition:background .2s;
}
.back-btn:hover{background:rgba(201,168,76,.1)}

/* PROGRESS */
.progress{height:2px;background:rgba(255,255,255,.05);flex-shrink:0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-pale));transition:width .3s ease;width:0%}

/* TABS */
.tabs{
  display:flex;overflow-x:auto;gap:1px;background:var(--border-dim);
  border-bottom:1px solid var(--border-dim);flex-shrink:0;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  background:var(--ink-mid);border:none;cursor:pointer;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:300;
  padding:10px 18px;white-space:nowrap;flex-shrink:0;
  display:flex;align-items:center;gap:8px;transition:background .15s,color .15s;
  border-bottom:2px solid transparent;
}
.tab:hover{background:#1a1d28;color:var(--cream)}
.tab.active{background:var(--ink);color:var(--cream);border-bottom-color:var(--gold)}
.tab-num{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--gold);font-weight:500}
.tab-dur{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);margin-left:4px}

/* CONTENT AREA */
.content{flex:1;overflow-y:auto;padding:0}
#area{max-width:800px;margin:0 auto;padding:32px 24px 100px}

/* SLIDE HEADER */
.slide-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border-dim)}
.slide-bar{width:3px;height:28px;background:var(--gold);border-radius:1px;flex-shrink:0}
.slide-header h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--cream);line-height:1.25}

/* CONTENT ELEMENTS */
.lead{font-size:1rem;color:rgba(245,240,230,.85);line-height:1.75;margin-bottom:20px;font-weight:300}
p{font-size:.9rem;color:rgba(245,240,230,.8);line-height:1.75;margin-bottom:14px}
p strong{color:var(--cream);font-weight:500}
p em{color:var(--gold-pale);font-style:italic}

.point{
  background:var(--ink-mid);border:1px solid var(--border-dim);border-left:3px solid var(--gold);
  border-radius:0 2px 2px 0;padding:10px 14px;margin-bottom:8px;
  font-size:.87rem;color:rgba(245,240,230,.85);line-height:1.55;
  transition:border-color .2s;
}
.point:hover{border-left-color:var(--gold-pale)}

.info-box{background:rgba(201,168,76,.06);border:1px solid var(--border);border-radius:2px;padding:16px 18px;margin:14px 0}
.info-box.green{background:rgba(112,208,160,.05);border-color:rgba(112,208,160,.2)}
.info-box.yellow{background:rgba(232,204,128,.05);border-color:rgba(232,204,128,.2)}
.info-box.red{background:rgba(232,100,100,.05);border-color:rgba(232,100,100,.2)}
.info-title{font-family:'DM Mono',monospace;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.info-box.green .info-title{color:#70d0a0}
.info-box.yellow .info-title{color:var(--gold-pale)}
.info-box.red .info-title{color:#f08080}
.info-text{font-size:.84rem;color:rgba(245,240,230,.78);line-height:1.65}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
@media(max-width:580px){.grid2{grid-template-columns:1fr}}
.card{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:14px;transition:border-color .2s}
.card:hover{border-color:var(--border)}
.card.gold-top{border-top:2px solid var(--gold)}
.card.blue-top{border-top:2px solid #7090e8}
.card.green-top{border-top:2px solid #70d0a0}
.card.red-top{border-top:2px solid #f08080}
.card-title{font-weight:500;color:var(--cream);font-size:.87rem;margin-bottom:4px}
.card-desc{font-size:.76rem;color:var(--muted);line-height:1.55}

/* PLANS */
.plan{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:14px}
.plan-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:4px}
.plan-price{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted);margin-bottom:10px;display:block}
.plan-feat{font-size:.76rem;color:rgba(245,240,230,.75);padding:2px 0;display:flex;gap:8px;line-height:1.4}
.plan-best{font-size:.7rem;margin-top:10px;padding:5px 9px;border-radius:2px;font-family:'DM Mono',monospace;letter-spacing:.04em}

/* COMPARE */
.compare{border:1px solid var(--border-dim);border-radius:2px;overflow:hidden;margin:14px 0;overflow-x:auto}
.compare-head{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;background:#13151e;border-bottom:1px solid var(--border-dim)}
.compare-hcell{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);padding:9px 10px;white-space:nowrap}
.compare-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr}
.compare-row.even{background:rgba(255,255,255,.02)}
.compare-feat{font-size:.78rem;color:var(--cream);padding:8px 10px}
.compare-val{font-size:.82rem;padding:8px 10px;text-align:center}
.compare-note{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);padding:7px 10px;border-top:1px solid var(--border-dim);background:#13151e}

/* FEAT CARDS */
.feat-card{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:14px;margin-bottom:8px;transition:border-color .2s}
.feat-card:hover{border-color:var(--border)}
.feat-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.feat-title{font-weight:500;color:var(--cream);font-size:.88rem}
.feat-desc{font-size:.8rem;color:var(--muted);line-height:1.6;margin-bottom:8px}
.feat-tip{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--gold);background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.15);padding:6px 10px;border-radius:2px}

/* MYTHS */
.myth{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:14px;margin-bottom:8px}
.myth-top{display:flex;align-items:center;gap:10px;font-size:.88rem;color:#f08080;margin-bottom:8px;font-weight:500}
.myth-top span{font-size:1rem}
.myth-bot{display:flex;align-items:flex-start;gap:10px;font-size:.82rem;color:rgba(245,240,230,.75);line-height:1.55}

/* TOOLS (chatbot cards) */
.tool-card{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:16px;margin-bottom:10px;transition:border-color .2s}
.tool-card:hover{border-color:var(--border)}
.tool-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tool-name{font-weight:500;color:var(--cream);font-size:.95rem}
.tool-badge{font-family:'DM Mono',monospace;font-size:.62rem;padding:3px 8px;border-radius:2px;letter-spacing:.06em}
.tool-desc{font-size:.82rem;color:var(--muted);line-height:1.6;margin-bottom:8px}
.tool-pros{list-style:none;display:flex;flex-wrap:wrap;gap:6px}
.tool-pro{font-size:.72rem;background:rgba(112,208,160,.08);border:1px solid rgba(112,208,160,.2);color:#70d0a0;padding:3px 8px;border-radius:2px;font-family:'DM Mono',monospace}

/* PROMPT EXAMPLES */
.prompt-box{background:#13151e;border:1px solid var(--border-dim);border-radius:2px;margin:10px 0;overflow:hidden}
.prompt-label-row{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border-dim)}
.prompt-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.copy-prompt-btn{font-family:'DM Mono',monospace;font-size:.6rem;padding:3px 9px;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;letter-spacing:.08em}
.copy-prompt-btn:hover{background:rgba(201,168,76,.1)}
.copy-prompt-btn.ok{background:rgba(112,208,160,.1);border-color:rgba(112,208,160,.3);color:#70d0a0}
.prompt-text-block{font-family:'DM Mono',monospace;font-size:.76rem;color:rgba(245,240,230,.8);padding:12px;line-height:1.7;white-space:pre-wrap}

/* QUIZ */
.quiz-q{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:14px;margin-bottom:10px}
.quiz-qt{font-size:.87rem;color:var(--cream);margin-bottom:10px;line-height:1.5;font-weight:400}
.quiz-opt{
  display:block;width:100%;text-align:left;background:transparent;
  border:1px solid var(--border-dim);color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:.8rem;padding:8px 12px;
  border-radius:2px;cursor:pointer;margin-bottom:6px;transition:all .2s;
}
.quiz-opt:hover{border-color:var(--border);color:var(--cream);background:rgba(201,168,76,.04)}
.quiz-opt.sel{border-color:var(--gold);color:var(--cream);background:rgba(201,168,76,.08)}
.quiz-opt.correct{border-color:#70d0a0;color:#70d0a0;background:rgba(112,208,160,.08)}
.quiz-opt.wrong{border-color:#f08080;color:#f08080;background:rgba(240,128,128,.08)}
.quiz-btn{
  display:block;width:100%;margin-top:16px;padding:12px;border-radius:2px;border:none;cursor:pointer;
  font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;
  transition:all .2s;
}
.result-box{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:16px;margin-bottom:14px}
.result-score{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold)}
.result-item{background:rgba(0,0,0,.2);border-radius:2px;padding:10px 12px;margin-bottom:8px}
.result-q{font-size:.82rem;color:var(--cream);margin-bottom:4px}
.result-wrong{font-size:.76rem;color:#f08080;margin-bottom:2px}
.result-ok{font-size:.76rem;color:#70d0a0}

/* STEP */
.step-box{display:flex;gap:14px;margin-bottom:12px;align-items:flex-start}
.step-num-circle{
  width:30px;height:30px;border-radius:2px;background:rgba(201,168,76,.12);border:1px solid var(--border);
  color:var(--gold);font-family:'DM Mono',monospace;font-size:.8rem;font-weight:500;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}
.step-title{font-weight:500;color:var(--cream);font-size:.88rem;margin-bottom:3px}
.step-text{font-size:.8rem;color:var(--muted);line-height:1.6}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(15,17,23,.95);border-top:1px solid var(--border-dim);
  backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;gap:16px;z-index:10;
}
.dot-wrap{display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:center}
.btn{
  font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;
  border-radius:2px;padding:9px 18px;cursor:pointer;border:none;transition:all .2s;
}
.btn-prev{background:transparent;border:1px solid var(--border);color:var(--gold)}
.btn-prev:hover:not(:disabled){background:rgba(201,168,76,.08)}
.btn-prev:disabled{opacity:.3;cursor:default}
.btn-next{background:var(--gold);color:var(--ink);font-weight:500}
.btn-next:hover:not(:disabled){background:var(--gold-pale)}
.btn-next:disabled{background:rgba(201,168,76,.2);color:var(--muted);cursor:default}

/* DIDACTIC TOOLS section */
.didactic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin:14px 0}
.didactic-card{background:var(--ink-mid);border:1px solid var(--border-dim);border-radius:2px;padding:14px;text-align:center;transition:border-color .2s,transform .2s}
.didactic-card:hover{border-color:var(--border);transform:translateY(-2px)}
.didactic-icon{font-size:1.6rem;margin-bottom:8px}
.didactic-name{font-size:.84rem;font-weight:500;color:var(--cream);margin-bottom:4px}
.didactic-desc{font-size:.72rem;color:var(--muted);line-height:1.5}

/* ETICA */
.etica-point{background:var(--ink-mid);border:1px solid var(--border-dim);border-left:3px solid;border-radius:0 2px 2px 0;padding:12px 14px;margin-bottom:8px}
.etica-title{font-weight:500;color:var(--cream);font-size:.88rem;margin-bottom:4px}
.etica-text{font-size:.8rem;color:var(--muted);line-height:1.55}

@media(max-width:600px){
  .bottom-nav{padding:8px 12px}
  .btn{padding:8px 12px;font-size:.65rem}
  #area{padding:20px 14px 90px}
}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="index.html" class="back-btn">← Home</a>
    <div class="h-left">AI nella Didattica — Lezione Laboratoriale</div>
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="h-right">Scuola sec. 2° grado · 2 ore</div>
    <div class="h-count" id="hcount">1 / 1</div>
  </div>
</div>

<div class="progress"><div class="progress-fill" id="prog"></div></div>
<div class="tabs" id="tabs"></div>

<div class="content"><div id="area"></div></div>

<div class="bottom-nav">
  <button class="btn btn-prev" id="bprev" onclick="nav(-1)">← Indietro</button>
  <div class="dot-wrap" id="dots"></div>
  <button class="btn btn-next" id="bnext" onclick="nav(1)">Avanti →</button>
</div>


<script>

const MODS=[
  {title:"Introduzione",dur:"15 min",slides:[
    {title:"I Chatbot AI: di cosa parliamo?",html:()=>`
      <p class="lead">I chatbot AI sono programmi capaci di conversare in linguaggio naturale, basati su Large Language Models (LLM): modelli addestrati su miliardi di testi per generare risposte coerenti e contestualmente appropriate.</p>
      <div class="point">Non comprendono nel senso umano: producono risposte statisticamente plausibili</div>
      <div class="point">Sono strumenti: la qualità dell'output dipende dalla qualità del prompt (input)</div>
      <div class="point">Possono «allucinare»: generare informazioni false presentate con sicurezza — verificare sempre le fonti</div>`},
    {title:"Perché integrarli nella didattica?",html:()=>`
      <p class="lead">Usati con metodo, gli strumenti AI possono trasformare significativamente la preparazione e la gestione della didattica quotidiana.</p>
      <div class="point">Risparmio di tempo — esercizi, verifiche e rubriche in pochi minuti</div>
      <div class="point">Personalizzazione — adattare contenuti per BES, DSA e livelli differenziati</div>
      <div class="point">Creatività — idee per attività innovative, simulazioni, discussioni guidate</div>
      <div class="point">Aggiornamento professionale — sintesi di articoli, spiegazioni di nuovi argomenti</div>`},
    {title:"Miti da sfatare",html:()=>`
      <div class="myth"><div class="myth-top"><span>✕</span>«L'AI sostituirà i professori»</div><div class="myth-bot"><span style="color:#2D6A1F;font-size:16px">✓</span>Il docente resta insostituibile per la relazione educativa, l'empatia, il giudizio etico e la lettura del contesto.</div></div>
      <div class="myth"><div class="myth-top"><span>✕</span>«Tutto ciò che dice l'AI è vero»</div><div class="myth-bot"><span style="color:#2D6A1F;font-size:16px">✓</span>I modelli possono allucinare. Verificare sempre le informazioni critiche con fonti primarie affidabili.</div></div>
      <div class="myth"><div class="myth-top"><span>✕</span>«Gli studenti imparano meno con l'AI»</div><div class="myth-bot"><span style="color:#2D6A1F;font-size:16px">✓</span>Dipende dalla progettazione didattica. L'AI può stimolare il pensiero critico se il docente struttura bene le attività.</div></div>`},
  ]},
  {title:"Claude",dur:"35 min",slides:[
    {title:"Claude — Profilo e caratteristiche distintive",html:()=>`
      <div class="info-box"><div class="info-title">Anthropic · Constitutional AI · Sicurezza · Affidabilità</div><div class="info-text">Claude è sviluppato da Anthropic (2021) con un approccio «Constitutional AI»: ogni risposta viene valutata su criteri di sicurezza, onestà e utilità. Particolarmente apprezzato per la gestione di testi lunghi, la qualità della prosa e il ragionamento strutturato.</div></div>
      <div class="grid2">
        <div class="card gold-top"><div class="card-title">Contesto esteso</div><div class="card-desc">Analizza fino a ~200.000 parole in una sola conversazione</div></div>
        <div class="card gold-top"><div class="card-title">Ragionamento avanzato</div><div class="card-desc">Eccellente per analisi complesse e spiegazioni strutturate</div></div>
        <div class="card gold-top"><div class="card-title">Qualità della prosa</div><div class="card-desc">Testi fluidi: lezioni, schede, relazioni, lettere ai genitori</div></div>
        <div class="card gold-top"><div class="card-title">Sicurezza by design</div><div class="card-desc">Risposta etica e trasparente, rifiuta contenuti dannosi</div></div>
      </div>`},
    {title:"Claude — I Piani Disponibili",html:()=>`
      <div class="grid2">
        ${[
          {name:"Free",price:"Gratuito",color:"#64748b",feats:["Accesso a Claude Sonnet","Messaggi giornalieri limitati","Web search (limitata)","Caricamento file e immagini","Projects limitati","Nessuna carta di credito"],best:"Esplorare lo strumento"},
          {name:"Pro",price:"20 €/mese",color:"#1a2744",feats:["Sonnet + Opus (il più potente)","Messaggi prioritari, nessuna attesa","Projects illimitati","Web search avanzata","Caricamento file illimitato","Artifacts interattivi"],best:"Uso professionale quotidiano"},
          {name:"Team",price:"25 €/utente/mese",color:"#2D6A1F",feats:["Tutto il piano Pro","Gestione centralizzata utenti","Dashboard amministratore","Finestra di contesto più ampia","Dati NON usati per training","Fatturazione unificata"],best:"Team docenti o dipartimento"},
          {name:"Enterprise",price:"Su preventivo",color:"#5C3D0E",feats:["Tutto il piano Team","SSO aziendale","GDPR enterprise e DPA dedicato","Integrazione API","Supporto prioritario dedicato","Deployment personalizzato"],best:"Istituti e reti di scuole"},
        ].map(p=>`
          <div class="plan" style="border-top:3px solid ${p.color}">
            <div class="plan-name" style="color:${p.color}">${p.name}</div>
            <div class="plan-price">${p.price}</div>
            ${p.feats.map(f=>`<div class="plan-feat"><span style="color:${p.color};flex-shrink:0">·</span>${f}</div>`).join('')}
            <div class="plan-best" style="background:${p.color}14;color:${p.color}">Ideale per: ${p.best}</div>
          </div>`).join('')}
      </div>`},
    {title:"Claude — Confronto tra Piani",html:()=>`
      <div class="compare">
        <div class="compare-head">
          <div class="compare-hcell">Funzionalità</div>
          <div class="compare-hcell" style="text-align:center">Free</div>
          <div class="compare-hcell" style="text-align:center">Pro</div>
          <div class="compare-hcell" style="text-align:center">Team</div>
          <div class="compare-hcell" style="text-align:center">Enterprise</div>

const flat=[];
MODS.forEach((m,mi)=>m.slides.forEach((s,si)=>flat.push({mi,si,s,m})));
let cur=0;
const qState={sel:{},done:false};

function renderQuiz(){
  const qs=MODS[MODS.length-1].slides[0].questions;
  if(qState.done){
    const sc=qs.filter((q,i)=>qState.sel[i]===q.ans).length;
    return `<div class="quiz-result" style="background:${sc>=6?'#F0F7ED':sc>=4?'#FBF6E9':'#FEF2F2'}">
      <div class="quiz-label" style="font-family:Georgia,serif;font-weight:700;font-size:16px;color:var(--navy);margin-bottom:8px">${sc>=6?'Ottimo risultato':sc>=4?'Buon risultato':'Da rivedere'}</div>
      <div class="quiz-score">${sc} / ${qs.length}</div>
      <div class="quiz-msg">${sc>=6?'Risultato eccellente. Sei pronta a integrare questi strumenti nella tua pratica didattica.':sc>=4?'Buon risultato. Rivedi le risposte segnate in rosso.':'Continua ad esplorare i materiali del corso.'}</div>
    </div>
    ${qs.map((q,qi)=>{const ok=qState.sel[qi]===q.ans;return`
      <div class="result-item" style="border-left:3px solid ${ok?'#2D6A1F':'#8B2020'}">
        <div class="result-q">${qi+1}. ${q.q}</div>
        ${!ok?`<div class="result-wrong">La tua risposta: ${q.opts[qState.sel[qi]]}</div>`:''}
        <div class="result-ok">✓ Risposta corretta: ${q.opts[q.ans]}</div>
      </div>`;}).join('')}`;
  }
  const done=Object.keys(qState.sel).length>=qs.length;
  return `${qs.map((q,qi)=>`
    <div class="quiz-q">
      <div class="quiz-qt">${qi+1}. ${q.q}</div>
      ${q.opts.map((o,oi)=>`<button class="quiz-opt ${qState.sel[qi]===oi?'sel':''}" onclick="pick(${qi},${oi})">${o}</button>`).join('')}
    </div>`).join('')}
  <button class="quiz-btn" style="background:${done?'var(--navy)':'#E8E4DA'};color:${done?'var(--gold-light)':'#B0A898'}" ${!done?'disabled':''} onclick="submit()">
    ${done?'Invia risposte':'Rispondi a tutte le domande ('+Object.keys(qState.sel).length+'/'+qs.length+')'}
  </button>`;
}
function pick(qi,oi){qState.sel[qi]=oi;draw();}
function submit(){qState.done=true;draw();}
function cp(btn,enc){
  navigator.clipboard.writeText(decodeURIComponent(enc));
  const o=btn.textContent;btn.textContent='COPIATO';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent=o;btn.classList.remove('ok');},2000);
}
function nav(d){cur=Math.max(0,Math.min(flat.length-1,cur+d));draw();}
function jumpSlide(i){cur=i;draw();}
function jumpMod(mi){cur=flat.findIndex(f=>f.mi===mi);draw();}

function draw(){
  const {mi,si,s,m}=flat[cur];
  // header
  document.getElementById('hcount').textContent=`${cur+1} / ${flat.length}`;
  document.getElementById('prog').style.width=`${((cur+1)/flat.length)*100}%`;
  // tabs
  document.getElementById('tabs').innerHTML=MODS.map((mod,i)=>`
    <button class="tab ${mi===i?'active':''}" onclick="jumpMod(${i})">
      <span class="tab-num">${String(i+1).padStart(2,'0')}</span>${mod.title}<span class="tab-dur">${mod.dur}</span>
    </button>`).join('');
  // dots
  const slides=flat.filter(f=>f.mi===mi);
  document.getElementById('dots').innerHTML=slides.map((_,i)=>{
    const absI=flat.findIndex(f=>f.mi===mi&&f.si===i);
    return `<div onclick="jumpSlide(${absI})" style="height:5px;border-radius:2px;cursor:pointer;background:${si===i?'var(--gold)':'var(--border)'};width:${si===i?20:6}px;transition:all .2s"></div>`;
  }).join('');
  // content
  document.getElementById('area').innerHTML=`
    <div class="slide-header"><div class="slide-bar"></div><h2>${s.title}</h2></div>
    ${s.html()}
    <div style="height:20px"></div>`;
  // nav
  document.getElementById('bprev').disabled=cur===0;
  document.getElementById('bnext').disabled=cur===flat.length-1;
  document.getElementById('bnext').style.opacity=cur===flat.length-1?.4:1;
  window.scrollTo(0,0);
}
draw();

</script>
