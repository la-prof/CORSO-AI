<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI nella Didattica — Lezione Laboratoriale 2h</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;min-height:100vh;padding-bottom:80px}
.header{background:#1e293b;color:white;padding:11px 20px;display:flex;align-items:center;justify-content:space-between}
.header-title{font-weight:700;font-size:14px;letter-spacing:.3px}
.header-sub{font-size:12px;color:#94a3b8}
.header-count{font-size:12px;font-weight:600;color:#94a3b8}
.progress-bar{height:3px;background:#e2e8f0}
.progress-fill{height:100%;transition:width .3s}
.tabs{display:flex;overflow-x:auto;background:white;border-bottom:1px solid #e2e8f0}
.tab-btn{padding:10px 14px;border:none;background:transparent;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;color:#6b7280;font-weight:400;transition:all .2s;text-align:left}
.tab-btn.active{font-weight:700;border-bottom-color:currentColor}
.tab-num{display:inline-block;width:20px;height:20px;border-radius:4px;background:#e2e8f0;color:#9ca3af;font-size:10px;font-weight:700;text-align:center;line-height:20px;margin-right:6px}
.tab-btn.active .tab-num{color:white}
.tab-dur{display:block;font-size:10px;color:#9ca3af;margin-top:2px}
.content{max-width:860px;margin:0 auto;padding:20px 16px}
.slide-title{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.title-bar{width:4px;height:22px;border-radius:2px;flex-shrink:0}
h2{font-size:19px;font-weight:800;color:#1e293b}
.card{background:white;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:12px}
.point{background:white;padding:11px 15px;border-radius:8px;border-left:3px solid;color:#374151;font-size:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
p.lead{color:#4b5563;line-height:1.8;font-size:14px;margin-bottom:16px}
.myth{background:white;border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.myth-top{background:#fef2f2;padding:10px 15px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #fee2e2;font-weight:700;color:#b91c1c;font-size:14px}
.myth-bot{padding:12px 15px;display:flex;gap:8px;font-size:14px;color:#374151;line-height:1.65}
.info-box{border-left:4px solid;border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:14px}
.info-title{font-weight:700;font-size:14px;margin-bottom:6px}
.info-text{font-size:14px;color:#374151;line-height:1.75}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:14px}
.plan-card{background:white;border-radius:10px;padding:14px;border:1px solid #e2e8f0}
.plan-name{font-weight:800;font-size:16px;margin-bottom:2px}
.plan-price{font-size:12px;font-weight:600;color:#6b7280;margin-bottom:10px}
.plan-feat{font-size:12px;color:#4b5563;display:flex;gap:6px;margin-bottom:5px}
.plan-best{border-radius:6px;padding:6px 10px;font-size:12px;font-weight:600;margin-top:10px}
.compare-wrap{background:white;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.compare-head{display:grid;grid-template-columns:1fr 68px 68px 68px 88px;padding:10px 14px}
.compare-row{display:grid;grid-template-columns:1fr 68px 68px 68px 88px;padding:10px 14px;border-bottom:1px solid #f3f4f6;align-items:center}
.compare-row.even{background:#fafafa}
.c-feat{font-size:13px;color:#374151}
.c-val{text-align:center;font-size:15px}
.feature-card{background:white;border-radius:12px;padding:15px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:3px solid;margin-bottom:12px}
.feature-head{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.feature-icon{font-size:20px}
.feature-title{font-weight:700;font-size:15px;color:#1e293b}
.feature-desc{color:#4b5563;font-size:14px;line-height:1.65;margin-bottom:8px}
.feature-tip{border-radius:7px;padding:7px 11px;font-size:13px}
.prompt-box{background:white;border-radius:10px;border:1px solid #e2e8f0;margin-bottom:12px;overflow:hidden}
.prompt-head{background:#f8fafc;padding:8px 14px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.prompt-label{font-weight:700;font-size:13px}
.copy-btn{color:white;border:none;border-radius:5px;padding:4px 12px;font-size:12px;cursor:pointer;font-weight:600}
.prompt-text{padding:12px 14px;font-family:monospace;font-size:13px;color:#374151;line-height:1.7;white-space:pre-wrap}
.activity-header{color:white;border-radius:10px;padding:13px 18px;margin-bottom:16px;display:flex;gap:12px;align-items:center;font-weight:700;font-size:15px}
.step{background:white;border-radius:8px;padding:11px 14px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 1px 3px rgba(0,0,0,.05);margin-bottom:9px}
.step-num{width:26px;height:26px;border-radius:50%;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.step-text{color:#374151;font-size:14px;line-height:1.55}
.reflection{border-radius:9px;padding:12px 15px;font-size:14px;color:#374151;line-height:1.65;border-left:3px solid}
.tool-header{color:white;border-radius:10px;padding:13px 18px;margin-bottom:14px}
.tool-name{font-weight:800;font-size:18px}
.tool-url{font-size:12px;opacity:.8;margin-top:2px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{border-radius:4px;padding:3px 10px;font-size:12px;font-weight:600}
.tip-box{border-radius:8px;padding:12px 15px;font-size:14px;line-height:1.7;border-left:3px solid}
.overview-card{background:white;border-radius:10px;padding:13px 15px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start}
.sum-wrap{background:white;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.sum-head{display:grid;grid-template-columns:110px 1fr 78px 78px;background:#1e293b;padding:10px 14px}
.sum-row{display:grid;grid-template-columns:110px 1fr 78px 78px;padding:10px 14px;border-bottom:1px solid #f3f4f6;align-items:center}
.sum-row.even{background:#fafafa}
.quiz-q{background:white;border-radius:12px;padding:15px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.quiz-q-text{font-weight:600;color:#1f2937;margin-bottom:10px;font-size:14px}
.quiz-opt{display:block;width:100%;padding:8px 12px;border-radius:7px;border:2px solid #e5e7eb;background:white;cursor:pointer;text-align:left;font-size:13px;color:#374151;margin-bottom:6px;transition:all .15s;font-family:inherit}
.quiz-opt.selected{border-color:#1e293b;background:#f8fafc;font-weight:700}
.quiz-opt.correct{border-color:#16a34a;background:#f0fdf4;font-weight:700;color:#166534}
.quiz-opt.wrong{border-color:#dc2626;background:#fef2f2;color:#b91c1c}
.quiz-submit{width:100%;padding:13px;border-radius:9px;border:none;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px}
.quiz-result{border-radius:14px;padding:24px;text-align:center;margin-bottom:18px}
.quiz-score{font-size:40px;font-weight:800;color:#1f2937}
.quiz-msg{font-size:14px;color:#4b5563;margin-top:8px}
.result-item{background:white;border-radius:9px;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.result-q{font-size:13px;font-weight:600;color:#1f2937;margin-bottom:4px}
.result-wrong{font-size:12px;color:#dc2626;margin-bottom:2px}
.result-correct{font-size:12px;color:#16a34a;font-weight:600}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e2e8f0;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.btn-prev,.btn-next{padding:8px 18px;border-radius:7px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.btn-prev{border:1px solid #e2e8f0;background:white;color:#374151}
.btn-prev:disabled{color:#d1d5db;cursor:not-allowed}
.btn-next{border:none;color:white}
.btn-next:disabled{background:#e2e8f0;color:#9ca3af;cursor:not-allowed}
.dot-nav{display:flex;gap:5px;align-items:center}
.dot{height:6px;border-radius:3px;cursor:pointer;transition:all .2s;background:#d1d5db}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">AI nella Didattica</div>
    <div class="header-sub">Laboratorio · 2 ore · Scuola secondaria di 2° grado</div>
  </div>
  <div class="header-count" id="slide-count">1 / 1</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<div class="tabs" id="tabs"></div>

<div class="content">
  <div id="slide-area"></div>
</div>

<div class="bottom-nav">
  <button class="btn-prev" id="btn-prev" onclick="navigate(-1)">← Indietro</button>
  <div class="dot-nav" id="dot-nav"></div>

</div>

// flat list of slides
const allSlides = [];
MODULES.forEach((m,mi)=>{
  m.slides.forEach((s,si)=>{
    allSlides.push({mod:mi,slide:si,data:s,modData:m});
  });
});

let cur = 0;
const quizState = { sel:{}, done:false };

function renderQuiz(){
  const qs = MODULES[MODULES.length-1].slides[0].questions;
  if(quizState.done){
    const score = qs.filter((q,i)=>quizState.sel[i]===q.ans).length;
    return `<div class="quiz-result" style="background:${score>=6?'#f0fdf4':score>=4?'#fefce8':'#fef2f2'}">
      <div style="font-size:48px;margin-bottom:8px">${score>=6?'🏆':score>=4?'👍':'📚'}</div>
      <div class="quiz-score">${score}/${qs.length}</div>
      <div class="quiz-msg">${score>=6?'Ottimo! Sei pronta a integrare questi strumenti nella tua didattica.':score>=4?'Buon risultato! Rivedi le risposte segnate.':'Continua ad esplorare i moduli.'}</div>
    </div>
    ${qs.map((q,qi)=>{
      const ok = quizState.sel[qi]===q.ans;
      return `<div class="result-item" style="border-left:3px solid ${ok?'#16a34a':'#dc2626'}">
        <div class="result-q">${qi+1}. ${q.q}</div>
        ${!ok?`<div class="result-wrong">La tua risposta: ${q.opts[quizState.sel[qi]]}</div>`:''}
        <div class="result-correct">✓ Risposta corretta: ${q.opts[q.ans]}</div>
      </div>`;
    }).join('')}`;
  }
  const allAnswered = Object.keys(quizState.sel).length >= qs.length;
  return `${qs.map((q,qi)=>`
    <div class="quiz-q">
      <div class="quiz-q-text">${qi+1}. ${q.q}</div>
      ${q.opts.map((opt,oi)=>`<button class="quiz-opt ${quizState.sel[qi]===oi?'selected':''}" onclick="selectOpt(${qi},${oi})">${opt}</button>`).join('')}
    </div>`).join('')}
  <button class="quiz-submit" style="background:${allAnswered?'#1e293b':'#e5e7eb'};color:${allAnswered?'white':'#9ca3af'}" ${!allAnswered?'disabled':''} onclick="submitQuiz()">
    ${allAnswered?'Invia risposte':'Rispondi a tutte le domande ('+Object.keys(quizState.sel).length+'/'+qs.length+')'}
  </button>`;
}

function selectOpt(qi,oi){
  quizState.sel[qi]=oi;
  draw();
}
function submitQuiz(){ quizState.done=true; draw(); }

function copyText(btn,encoded){
  const text = decodeURIComponent(encoded);
  navigator.clipboard.writeText(text);
  const orig = btn.textContent;
  btn.textContent='✓ Copiato'; btn.style.background='#16a34a';
  setTimeout(()=>{ btn.textContent=orig; btn.style.background='#1e40af'; },2000);
}

function navigate(dir){
  cur = Math.max(0, Math.min(allSlides.length-1, cur+dir));
  draw();
}

function jumpSlide(i){ cur=i; draw(); }

function draw(){
  const {data, modData, mod, slide} = allSlides[cur];
  const acc = modData.accent;

  // progress
  document.getElementById('progress-fill').style.width = `${((cur+1)/allSlides.length)*100}%`;
  document.getElementById('progress-fill').style.background = acc;
  document.getElementById('slide-count').textContent = `${cur+1} / ${allSlides.length}`;

  // tabs
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = MODULES.map((m,i)=>{
    const active = mod===i;
    return `<button class="tab-btn ${active?'active':''}" style="color:${active?m.accent:'#6b7280'};border-bottom-color:${active?m.accent:'transparent'}" onclick="jumpToMod(${i})">
      <span class="tab-num" style="${active?'background:'+m.accent+';color:white':''}">${String(i+1).padStart(2,'0')}</span>${m.title}<span class="tab-dur">${m.duration}</span>
    </button>`;
  }).join('');

  // slide content
  const slides = allSlides.filter(s=>s.mod===mod);
  const slideContent = data.isQuiz ? renderQuiz() : data.render();
  document.getElementById('slide-area').innerHTML = `
    <div class="slide-title"><div class="title-bar" style="background:${acc}"></div><h2>${data.title}</h2></div>
    ${slideContent}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:16px;border-top:1px solid #e2e8f0">
      <div></div>
      <div style="display:flex;gap:5px;align-items:center">
        ${slides.map((_,i)=>{
          const absI = allSlides.findIndex(s=>s.mod===mod&&s.slide===i);
          return `<div onclick="jumpSlide(${absI})" style="height:6px;border-radius:3px;cursor:pointer;transition:all .2s;background:${slide===i?acc:'#d1d5db'};width:${slide===i?20:6}px"></div>`;
        }).join('')}
      </div>
      <div></div>
    </div>`;

  // nav buttons
  document.getElementById('btn-prev').disabled = cur===0;
  document.getElementById('btn-next').disabled = cur===allSlides.length-1;
  document.getElementById('btn-next').style.background = cur===allSlides.length-1?'#e2e8f0':acc;

  window.scrollTo(0,0);
}

function jumpToMod(mi){
  cur = allSlides.findIndex(s=>s.mod===mi);
  draw();
}

draw();
</script>
