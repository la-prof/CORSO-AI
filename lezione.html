<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI nella Didattica — Lezione Laboratoriale</title>
<style>
:root{
  --navy:#1a2744;--navy-light:#243256;
  --gold:#8B6914;--gold-light:#C49A28;
  --cream:#FAF8F3;--cream-dark:#F0EBE0;
  --text:#2C2C2C;--muted:#6B6560;
  --border:#D9D0BC;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--cream);color:var(--text);min-height:100vh;padding-bottom:80px}

/* HEADER */
.header{background:var(--navy);color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold)}
.h-left{font-family:Georgia,serif;font-weight:700;font-size:15px;letter-spacing:.2px}
.h-right{font-size:11px;color:#7A8BA3;letter-spacing:.5px}
.h-count{font-size:12px;font-weight:700;color:var(--gold-light);background:rgba(255,255,255,.08);padding:3px 12px;border-radius:2px}

/* PROGRESS */
.progress{height:2px;background:#e2e8f0}
.progress-fill{height:100%;background:var(--gold);transition:width .3s}

/* TABS */
.tabs{display:flex;overflow-x:auto;background:var(--white);border-bottom:1px solid var(--border)}
.tab{padding:11px 16px;border:none;background:transparent;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;border-bottom:2px solid transparent;color:var(--muted);font-weight:400;transition:all .2s;text-align:left;font-family:inherit}
.tab.active{font-weight:700;border-bottom-color:var(--gold);color:var(--navy)}
.tab-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:2px;background:#EDE9DE;color:#9A8F7E;font-size:10px;font-weight:700;margin-right:7px}
.tab.active .tab-num{background:var(--navy);color:var(--gold-light)}
.tab-dur{display:block;font-size:10px;color:#B0A898;margin-top:2px;font-weight:400}

/* CONTENT */
.content{max-width:860px;margin:0 auto;padding:32px 20px}
.slide-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.slide-bar{width:3px;height:24px;background:var(--gold);flex-shrink:0;border-radius:1px}
h2{font-family:Georgia,serif;font-size:21px;font-weight:700;color:var(--navy);line-height:1.3}
p.lead{color:var(--muted);line-height:1.85;font-size:14px;margin-bottom:16px}

/* POINT ROWS */
.point{background:var(--white);padding:11px 16px;border-radius:2px;border-left:3px solid var(--gold);color:var(--text);font-size:14px;margin-bottom:8px;border:1px solid var(--border);border-left:3px solid var(--gold)}

/* MYTH */
.myth{background:var(--white);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:14px}
.myth-top{background:#FEF6F6;padding:10px 16px;display:flex;gap:9px;align-items:center;font-weight:700;color:#8B2020;font-size:13px;border-bottom:1px solid #F5DDD D}
.myth-bot{padding:12px 16px;display:flex;gap:9px;font-size:13px;color:var(--text);line-height:1.7}

/* INFO BOX */
.info-box{border-left:3px solid var(--gold);background:var(--white);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:2px;padding:14px 18px;margin-bottom:14px}
.info-box.green{border-left-color:#2D6A1F}
.info-box.warn{border-left-color:#8B4513}
.info-title{font-weight:700;font-size:13px;color:var(--gold);margin-bottom:6px}
.info-box.green .info-title{color:#2D6A1F}
.info-box.warn .info-title{color:#8B4513}
.info-text{font-size:13px;color:var(--muted);line-height:1.75}

/* GRID 2 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:16px}
.card.gold-top{border-top:2px solid var(--gold)}
.card-icon{font-size:22px;margin-bottom:8px}
.card-title{font-weight:700;color:var(--navy);font-size:14px;margin-bottom:5px;font-family:Georgia,serif}
.card-desc{font-size:12px;color:var(--muted);line-height:1.55}

/* PLAN CARDS */
.plan{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:16px}
.plan-name{font-family:Georgia,serif;font-weight:700;font-size:17px;margin-bottom:2px}
.plan-price{font-size:12px;color:var(--muted);margin-bottom:12px;font-weight:600}
.plan-feat{font-size:12px;color:var(--text);display:flex;gap:7px;margin-bottom:5px;line-height:1.5}
.plan-best{margin-top:10px;font-size:12px;font-weight:600;border-radius:2px;padding:5px 10px}

/* COMPARE TABLE */
.compare{background:var(--white);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:14px}
.compare-head{display:grid;grid-template-columns:1fr 68px 68px 68px 88px;background:var(--navy);padding:10px 14px}
.compare-hcell{font-weight:700;font-size:11px;color:var(--gold-light);letter-spacing:.5px}
.compare-row{display:grid;grid-template-columns:1fr 68px 68px 68px 88px;padding:9px 14px;border-bottom:1px solid var(--cream-dark);align-items:center}
.compare-row.even{background:var(--cream)}
.compare-feat{font-size:13px;color:var(--text)}
.compare-val{text-align:center;font-size:14px}
.compare-note{padding:7px 14px;font-size:11px;color:#B0A898;font-style:italic}

/* FEATURE CARDS */
.feat-card{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:2px;padding:16px;margin-bottom:12px}
.feat-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.feat-icon{font-size:20px}
.feat-title{font-weight:700;font-size:15px;color:var(--navy);font-family:Georgia,serif}
.feat-desc{color:var(--muted);font-size:13px;line-height:1.7;margin-bottom:9px}
.feat-tip{background:var(--cream);border-radius:2px;padding:8px 12px;font-size:12px;color:var(--gold);border-left:2px solid var(--gold)}

/* PROMPTS */
.prompt{background:var(--white);border:1px solid var(--border);border-radius:2px;margin-bottom:12px;overflow:hidden}
.prompt-head{background:var(--cream);padding:9px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.prompt-label{font-weight:700;font-size:12px;color:var(--gold);letter-spacing:.3px}
.copy-btn{background:var(--navy);color:white;border:none;border-radius:2px;padding:4px 12px;font-size:11px;cursor:pointer;font-weight:700;letter-spacing:.5px;font-family:inherit}
.copy-btn.ok{background:#2D6A1F}
.prompt-text{padding:12px 14px;font-family:monospace;font-size:12px;color:var(--text);line-height:1.8;white-space:pre-wrap}

/* ACTIVITY */
.activity-hd{background:var(--navy);color:white;border-radius:2px;padding:14px 18px;margin-bottom:16px;display:flex;gap:12px;align-items:center}
.activity-hd strong{font-family:Georgia,serif;font-size:15px}
.step{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:11px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
.step-n{width:26px;height:26px;border-radius:50%;background:var(--navy);color:var(--gold-light);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.step-text{font-size:13px;color:var(--text);line-height:1.6}
.reflection{background:var(--cream);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:2px;padding:12px 16px;font-size:13px;color:var(--muted);line-height:1.7;margin-top:12px;font-style:italic}

/* TOOL HEADER */
.tool-hd{background:var(--navy);color:white;border-radius:2px;padding:14px 18px;margin-bottom:14px;border-left:4px solid var(--gold)}
.tool-name{font-family:Georgia,serif;font-weight:700;font-size:19px;margin-bottom:3px}
.tool-url{font-size:11px;color:var(--gold-light);letter-spacing:.5px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{background:var(--cream-dark);color:var(--navy);border:1px solid var(--border);border-radius:2px;padding:3px 10px;font-size:11px;font-weight:600;letter-spacing:.3px}
.tip{background:var(--cream);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:2px;padding:12px 16px;font-size:13px;color:var(--muted);line-height:1.7}

/* OVERVIEW */
.ov-card{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:2px;padding:13px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.ov-best{background:var(--cream-dark);color:var(--navy);border-radius:2px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap;border:1px solid var(--border)}

/* SUMMARY TABLE */
.sum{background:var(--white);border:1px solid var(--border);border-radius:2px;overflow:hidden}
.sum-head{display:grid;grid-template-columns:110px 1fr 76px 76px;background:var(--navy);padding:10px 14px}
.sum-hcell{font-size:11px;font-weight:700;color:var(--gold-light);letter-spacing:.5px}
.sum-row{display:grid;grid-template-columns:110px 1fr 76px 76px;padding:10px 14px;border-bottom:1px solid var(--cream-dark);align-items:center}
.sum-row.even{background:var(--cream)}
.sum-name{font-weight:700;color:var(--navy);font-size:13px}
.sum-desc{font-size:12px;color:var(--muted)}
.sum-val{text-align:center;font-size:14px}

/* QUIZ */
.quiz-q{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:16px;margin-bottom:12px}
.quiz-qt{font-weight:700;color:var(--navy);font-size:13px;margin-bottom:10px;line-height:1.5;font-family:Georgia,serif}
.quiz-opt{display:block;width:100%;padding:9px 13px;border-radius:2px;border:1px solid var(--border);background:var(--cream);cursor:pointer;text-align:left;font-size:13px;color:var(--text);margin-bottom:6px;transition:all .15s;font-family:inherit}
.quiz-opt.sel{border-color:var(--navy);background:var(--cream-dark);font-weight:700;color:var(--navy)}
.quiz-opt.correct{border-color:#2D6A1F;background:#F0F7ED;color:#1A4A0F;font-weight:700}
.quiz-opt.wrong{border-color:#8B2020;background:#FEF2F2;color:#6B1010}
.quiz-btn{width:100%;padding:13px;border-radius:2px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:Georgia,serif;letter-spacing:.5px;margin-top:6px;transition:all .2s}
.quiz-result{border-radius:2px;padding:28px;text-align:center;margin-bottom:18px;border:1px solid var(--border)}
.quiz-score{font-family:Georgia,serif;font-size:44px;font-weight:700;color:var(--navy)}
.quiz-emoji{font-size:44px;margin-bottom:10px}
.quiz-msg{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.65}
.result-item{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:12px 14px;margin-bottom:8px}
.result-q{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:5px}
.result-wrong{font-size:12px;color:#8B2020;margin-bottom:3px}
.result-ok{font-size:12px;color:#2D6A1F;font-weight:700}

/* FORMULA */
.formula-box{background:var(--white);border:1px solid var(--border);border-radius:2px;padding:18px;margin-bottom:20px}
.formula-title{font-family:Georgia,serif;font-weight:700;color:var(--navy);font-size:14px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.formula-row{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--cream-dark)}
.formula-row:last-child{border-bottom:none}
.f-tag{background:var(--navy);color:var(--gold-light);border-radius:2px;padding:2px 9px;font-size:11px;font-weight:700;letter-spacing:.5px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.f-ex{font-size:13px;color:var(--muted);line-height:1.6}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 16px rgba(26,39,68,.06)}
.btn{padding:8px 20px;border-radius:2px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:.5px}
.btn-prev{border:1px solid var(--border);background:var(--white);color:var(--text)}
.btn-prev:disabled{color:#C8BFB5;cursor:not-allowed}
.btn-next{border:none;background:var(--navy);color:var(--gold-light)}
.btn-next:disabled{background:#E8E4DA;color:#B0A898;cursor:not-allowed}
.dot-wrap{display:flex;gap:5px;align-items:center}
.dot{height:5px;border-radius:2px;cursor:pointer;transition:all .2s;background:var(--border)}
</style>
</head>
<body>

<div class="header">
  <div class="h-left">AI nella Didattica &mdash; Lezione Laboratoriale</div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="h-right">Scuola sec. 2° grado · 2 ore</div>
    <div class="h-count" id="hcount">1 / 1</div>
  </div>
</div>
<div class="progress"><div class="progress-fill" id="prog"></div></div>
<div class="tabs" id="tabs"></div>

<div class="content"><div id="area"></div></div>

<div class="bottom-nav">
  <button class="btn btn-prev" id="bprev" onclick="nav(-1)">← Indietro</button>
  <div class="dot-wrap" id="dots"></div>
  <button class="btn btn-next" id="bnext" onclick="nav(1)">Avanti →</button>
</div>

<script>
const MODS=[
  {title:"Introduzione",dur:"15 min",slides:[
    {title:"I Chatbot AI: di cosa parliamo?",html:()=>`
      <p class="lead">I chatbot AI sono programmi capaci di conversare in linguaggio naturale, basati su Large Language Models (LLM): modelli addestrati su miliardi di testi per generare risposte coerenti e contestualmente appropriate.</p>
      <div class="point">Non comprendono nel senso umano: producono risposte statisticamente plausibili</div>
      <div class="point">Sono strumenti: la qualità dell'output dipende dalla qualità del prompt (input)</div>
      <div class="point">Possono «allucinare»: generare informazioni false presentate con sicurezza — verificare sempre le fonti</div>`},
    {title:"Perché integrarli nella didattica?",html:()=>`
      <p class="lead">Usati con metodo, gli strumenti AI possono trasformare significativamente la preparazione e la gestione della didattica quotidiana.</p>
      <div class="point">⏱ Risparmio di tempo — esercizi, verifiche e rubriche in pochi minuti</div>
      <div class="point">✏️ Personalizzazione — adattare contenuti per BES, DSA e livelli differenziati</div>
      <div class="point">💡 Creatività — idee per attività innovative, simulazioni, discussioni guidate</div>
      <div class="point">📚 Aggiornamento professionale — sintesi di articoli, spiegazioni di nuovi argomenti</div>`},
    {title:"Miti da sfatare",html:()=>`
      <div class="myth"><div class="myth-top"><span>✕</span>«L'AI sostituirà i professori»</div><div class="myth-bot"><span style="color:#2D6A1F;font-size:16px">✓</span>Il docente resta insostituibile per la relazione educativa, l'empatia, il giudizio etico e la lettura del contesto.</div></div>
      <div class="myth"><div class="myth-top"><span>✕</span>«Tutto ciò che dice l'AI è vero»</div><div class="myth-bot"><span style="color:#2D6A1F;font-size:16px">✓</span>I modelli possono allucinare. Verificare sempre le informazioni critiche con fonti primarie affidabili.</div></div>
      <div class="myth"><div class="myth-top"><span>✕</span>«Gli studenti imparano meno con l'AI»</div><div class="myth-bot"><span style="color:#2D6A1F;font-size:16px">✓</span>Dipende dalla progettazione didattica. L'AI può stimolare il pensiero critico se il docente struttura bene le attività.</div></div>`},
  ]},
  {title:"Claude ⭐",dur:"35 min",slides:[
    {title:"Claude — Profilo e caratteristiche distintive",html:()=>`
      <div class="info-box"><div class="info-title">Anthropic · Constitutional AI · Sicurezza · Affidabilità</div><div class="info-text">Claude è sviluppato da Anthropic (2021) con un approccio «Constitutional AI»: ogni risposta viene valutata su criteri di sicurezza, onestà e utilità. Particolarmente apprezzato per la gestione di testi lunghi, la qualità della prosa e il ragionamento strutturato.</div></div>
      <div class="grid2">
        <div class="card gold-top"><div class="card-icon">📄</div><div class="card-title">Contesto esteso</div><div class="card-desc">Analizza fino a ~200.000 parole in una sola conversazione</div></div>
        <div class="card gold-top"><div class="card-icon">🧠</div><div class="card-title">Ragionamento avanzato</div><div class="card-desc">Eccellente per analisi complesse e spiegazioni strutturate</div></div>
        <div class="card gold-top"><div class="card-icon">✍️</div><div class="card-title">Qualità della prosa</div><div class="card-desc">Testi fluidi: lezioni, schede, relazioni, lettere ai genitori</div></div>
        <div class="card gold-top"><div class="card-icon">🛡️</div><div class="card-title">Sicurezza by design</div><div class="card-desc">Risposta etica e trasparente, rifiuta contenuti dannosi</div></div>
      </div>`},
    {title:"Claude — I Piani Disponibili",html:()=>`
      <div class="grid2">
        ${[
          {name:"Free",price:"Gratuito",color:"#64748b",feats:["Accesso a Claude Sonnet","Messaggi giornalieri limitati","Web search (limitata)","Caricamento file e immagini","Projects limitati","Nessuna carta di credito"],best:"Esplorare lo strumento"},
          {name:"Pro",price:"20 €/mese",color:"#1a2744",feats:["Sonnet + Opus (il più potente)","Messaggi prioritari, nessuna attesa","Projects illimitati","Web search avanzata","Caricamento file illimitato","Artifacts interattivi"],best:"Uso professionale quotidiano"},
          {name:"Team",price:"25 €/utente/mese",color:"#2D6A1F",feats:["Tutto il piano Pro","Gestione centralizzata utenti","Dashboard amministratore","Finestra di contesto più ampia","Dati NON usati per training","Fatturazione unificata"],best:"Team docenti o dipartimento"},
          {name:"Enterprise",price:"Su preventivo",color:"#5C3D0E",feats:["Tutto il piano Team","SSO aziendale","GDPR enterprise e DPA dedicato","Integrazione API","Supporto prioritario dedicato","Deployment personalizzato"],best:"Istituti e reti di scuole"},
        ].map(p=>`
          <div class="plan" style="border-top:3px solid ${p.color}">
            <div class="plan-name" style="color:${p.color}">${p.name}</div>
            <div class="plan-price">${p.price}</div>
            ${p.feats.map(f=>`<div class="plan-feat"><span style="color:${p.color};flex-shrink:0">·</span>${f}</div>`).join('')}
            <div class="plan-best" style="background:${p.color}14;color:${p.color}">Ideale per: ${p.best}</div>
          </div>`).join('')}
      </div>`},
    {title:"Claude — Confronto tra Piani",html:()=>`
      <div class="compare">
        <div class="compare-head">
          <div class="compare-hcell">Funzionalità</div>
          <div class="compare-hcell" style="text-align:center">Free</div>
          <div class="compare-hcell" style="text-align:center">Pro</div>
          <div class="compare-hcell" style="text-align:center">Team</div>
          <div class="compare-hcell" style="text-align:center">Enterprise</div>
        </div>
        ${[["Claude Sonnet","✅","✅","✅","✅"],["Claude Opus","❌","✅","✅","✅"],["Projects illimitati","❌","✅","✅","✅"],["Web Search","⚠️","✅","✅","✅"],["Caricamento file","✅","✅","✅","✅"],["Artifacts","✅","✅","✅","✅"],["Dati non per training","❌","❌","✅","✅"],["Admin dashboard","❌","❌","✅","✅"],["SSO / GDPR enterprise","❌","❌","❌","✅"],].map((r,i)=>`
          <div class="compare-row ${i%2===0?'even':''}">
            <div class="compare-feat">${r[0]}</div>
            <div class="compare-val">${r[1]}</div>
            <div class="compare-val">${r[2]}</div>
            <div class="compare-val">${r[3]}</div>
            <div class="compare-val">${r[4]}</div>
          </div>`).join('')}
        <div class="compare-note">✅ Incluso &nbsp;·&nbsp; ⚠️ Limitato &nbsp;·&nbsp; ❌ Non disponibile</div>
      </div>`},
    {title:"Claude — Funzionalità per il Docente",html:()=>`
      ${[
        {icon:"📁",title:"Projects",desc:"Crea un progetto per ogni classe o UDA. Carica programmi, materiali, libri di testo: Claude li ricorda in tutte le conversazioni del progetto.",tip:"💡 Crea un Project «Classe 4B Informatica» e carica la tua programmazione annuale"},
        {icon:"🎨",title:"Artifacts",desc:"Genera contenuti interattivi direttamente nella chat: quiz HTML, tabelle comparative, timeline, infografiche e presentazioni.",tip:"💡 Chiedi: «Crea un quiz interattivo su [argomento] per i miei studenti»"},
        {icon:"🌐",title:"Web Search",desc:"Cerca informazioni aggiornate sul web e le integra nelle risposte con riferimenti verificabili alle fonti.",tip:"💡 «Cerca le ultime linee guida MIUR sull'uso dell'AI a scuola»"},
        {icon:"🧩",title:"Caricamento file",desc:"Carica PDF, Word, immagini e chiedi di analizzarli, riassumerli o usarli come base per nuovi materiali.",tip:"💡 Carica la verifica dell'anno scorso e chiedi di creare una versione aggiornata"},
      ].map(f=>`
        <div class="feat-card">
          <div class="feat-head"><span class="feat-icon">${f.icon}</span><span class="feat-title">${f.title}</span></div>
          <div class="feat-desc">${f.desc}</div>
          <div class="feat-tip">${f.tip}</div>

const flat=[];
MODS.forEach((m,mi)=>m.slides.forEach((s,si)=>flat.push({mi,si,s,m})));
let cur=0;
const qState={sel:{},done:false};

function renderQuiz(){
  const qs=MODS[MODS.length-1].slides[0].questions;
  if(qState.done){
    const sc=qs.filter((q,i)=>qState.sel[i]===q.ans).length;
    return `<div class="quiz-result" style="background:${sc>=6?'#F0F7ED':sc>=4?'#FBF6E9':'#FEF2F2'}">
      <div class="quiz-emoji">${sc>=6?'🏆':sc>=4?'👍':'📚'}</div>
      <div class="quiz-score">${sc} / ${qs.length}</div>
      <div class="quiz-msg">${sc>=6?'Risultato eccellente. Sei pronta a integrare questi strumenti nella tua pratica didattica.':sc>=4?'Buon risultato. Rivedi le risposte segnate in rosso.':'Continua ad esplorare i materiali del corso.'}</div>
    </div>
    ${qs.map((q,qi)=>{const ok=qState.sel[qi]===q.ans;return`
      <div class="result-item" style="border-left:3px solid ${ok?'#2D6A1F':'#8B2020'}">
        <div class="result-q">${qi+1}. ${q.q}</div>
        ${!ok?`<div class="result-wrong">La tua risposta: ${q.opts[qState.sel[qi]]}</div>`:''}
        <div class="result-ok">✓ Risposta corretta: ${q.opts[q.ans]}</div>
      </div>`;}).join('')}`;
  }
  const done=Object.keys(qState.sel).length>=qs.length;
  return `${qs.map((q,qi)=>`
    <div class="quiz-q">
      <div class="quiz-qt">${qi+1}. ${q.q}</div>
      ${q.opts.map((o,oi)=>`<button class="quiz-opt ${qState.sel[qi]===oi?'sel':''}" onclick="pick(${qi},${oi})">${o}</button>`).join('')}
    </div>`).join('')}
  <button class="quiz-btn" style="background:${done?'var(--navy)':'#E8E4DA'};color:${done?'var(--gold-light)':'#B0A898'}" ${!done?'disabled':''} onclick="submit()">
    ${done?'Invia risposte':'Rispondi a tutte le domande ('+Object.keys(qState.sel).length+'/'+qs.length+')'}
  </button>`;
}
function pick(qi,oi){qState.sel[qi]=oi;draw();}
function submit(){qState.done=true;draw();}
function cp(btn,enc){
  navigator.clipboard.writeText(decodeURIComponent(enc));
  const o=btn.textContent;btn.textContent='COPIATO';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent=o;btn.classList.remove('ok');},2000);
}
function nav(d){cur=Math.max(0,Math.min(flat.length-1,cur+d));draw();}
function jumpSlide(i){cur=i;draw();}
function jumpMod(mi){cur=flat.findIndex(f=>f.mi===mi);draw();}

function draw(){
  const {mi,si,s,m}=flat[cur];
  // header
  document.getElementById('hcount').textContent=`${cur+1} / ${flat.length}`;
  document.getElementById('prog').style.width=`${((cur+1)/flat.length)*100}%`;
  // tabs
  document.getElementById('tabs').innerHTML=MODS.map((mod,i)=>`
    <button class="tab ${mi===i?'active':''}" onclick="jumpMod(${i})">
      <span class="tab-num">${String(i+1).padStart(2,'0')}</span>${mod.title}<span class="tab-dur">${mod.dur}</span>
    </button>`).join('');
  // dots
  const slides=flat.filter(f=>f.mi===mi);
  document.getElementById('dots').innerHTML=slides.map((_,i)=>{
    const absI=flat.findIndex(f=>f.mi===mi&&f.si===i);
    return `<div onclick="jumpSlide(${absI})" style="height:5px;border-radius:2px;cursor:pointer;background:${si===i?'var(--gold)':'var(--border)'};width:${si===i?20:6}px;transition:all .2s"></div>`;
  }).join('');
  // content
  document.getElementById('area').innerHTML=`
    <div class="slide-header"><div class="slide-bar"></div><h2>${s.title}</h2></div>
    ${s.html()}
    <div style="height:20px"></div>`;
  // nav
  document.getElementById('bprev').disabled=cur===0;
  document.getElementById('bnext').disabled=cur===flat.length-1;
  document.getElementById('bnext').style.opacity=cur===flat.length-1?.4:1;
  window.scrollTo(0,0);
}
draw();
</script>
