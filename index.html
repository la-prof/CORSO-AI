<script>
let current = 0;

const sections = [

// 0 — Cos'è Claude
`<div class="section-title"><div class="section-num">1</div><h2>Cos'è Claude</h2></div>
<p><strong>Claude</strong> è un assistente AI sviluppato da <strong>Anthropic</strong>, azienda americana fondata nel 2021 da ex ricercatori di OpenAI. È progettato con un approccio chiamato <em>Constitutional AI</em>: ogni risposta viene valutata su criteri di sicurezza, onestà e utilità prima di essere fornita all'utente.</p>
<div class="info-box"><div class="info-box-title">🎯 Perché Claude è adatto ai docenti?</div><div class="info-box-text">Claude eccelle in tre aree particolarmente utili per chi insegna: la <strong>gestione di testi lunghi</strong> (analizza documenti interi, programmi, libri), la <strong>qualità della scrittura</strong> (produce testi fluidi e ben strutturati) e il <strong>ragionamento sfumato</strong> (tiene conto del contesto scolastico se lo descrivi con precisione).</div></div>
<div class="grid2">
  <div class="card blue-top"><div class="card-icon">📄</div><div class="card-title">Contesto esteso</div><div class="card-desc">Analizza fino a ~200.000 parole in una sola chat</div></div>
  <div class="card blue-top"><div class="card-icon">✍️</div><div class="card-title">Qualità della prosa</div><div class="card-desc">Testi chiari e adatti al registro richiesto</div></div>
  <div class="card blue-top"><div class="card-icon">🧠</div><div class="card-title">Ragionamento</div><div class="card-desc">Spiegazioni strutturate, argomentazioni, analisi</div></div>
  <div class="card blue-top"><div class="card-icon">🛡️</div><div class="card-title">Sicurezza</div><div class="card-desc">Rifiuta contenuti dannosi, è trasparente sui limiti</div></div>
</div>`,

// 1 — Come iniziare
`<div class="section-title"><div class="section-num">2</div><h2>Come iniziare</h2></div>
<p>Claude è accessibile via browser da qualsiasi dispositivo, senza installare nulla. Puoi iniziare gratuitamente in meno di due minuti.</p>
<div class="step"><div class="step-num">1</div><div><div class="step-title">Vai su claude.ai</div><div class="step-text">Apri il browser e digita <strong>claude.ai</strong>. Il sito è disponibile anche in italiano.</div></div></div>
<div class="step"><div class="step-num">2</div><div><div class="step-title">Crea un account gratuito</div><div class="step-text">Clicca su <em>Sign up</em> e registrati con Google, Microsoft o qualsiasi email. Non è richiesta una carta di credito per il piano gratuito.</div></div></div>
<div class="step"><div class="step-num">3</div><div><div class="step-title">Scegli il tuo piano</div><div class="step-text">Il piano <strong>Free</strong> è sufficiente per iniziare. Per uso quotidiano professionale, il piano <strong>Pro</strong> (20 €/mese) sblocca tutti i modelli e i Projects illimitati.</div></div></div>
<div class="step"><div class="step-num">4</div><div><div class="step-title">Inizia a conversare</div><div class="step-text">Scrivi il tuo primo messaggio nella casella in basso. Non serve un prompt perfetto: inizia con una richiesta semplice e affina man mano.</div></div></div>
<div class="info-box green"><div class="info-box-title">💡 Suggerimento per iniziare</div><div class="info-box-text">La prima cosa che ti consiglio è di presentarti: <em>«Sono una docente di informatica in un liceo scientifico. Vorrei usarti per preparare materiali didattici. Come posso iniziare?»</em> — Claude ti guiderà.</div></div>`,

// 2 — La Chat
`<div class="section-title"><div class="section-num">3</div><h2>La Chat — Come funziona</h2></div>
<p>La chat è il modo più semplice per interagire con Claude. Ogni conversazione è <strong>autonoma</strong>: Claude ricorda tutto ciò che hai scritto nella conversazione corrente, ma quando apri una nuova chat riparte da zero, senza memoria delle sessioni precedenti.</p>
<div class="chat-area">
  <div class="chat-label"><span class="badge" style="background:#1e40af">ESEMPIO</span> Preparare una verifica — conversazione reale</div>
  <div class="bubble-wrap user"><div class="bubble user">Crea una verifica scritta su Python (liste e dizionari) per una classe 4ª di istituto tecnico informatico. 8 esercizi di difficoltà crescente. Tempo: 2 ore.</div><div class="avatar user">D</div></div>
  <div class="bubble-wrap"><div class="avatar claude">C</div><div class="bubble claude">Ecco la verifica su liste e dizionari in Python, strutturata in difficoltà crescente per 2 ore di lavoro.<br><br><strong>Parte A — Liste (30 pt)</strong><br>Es. 1: Scrivi una funzione che dato una lista di interi restituisca la somma degli elementi positivi...<br>Es. 2: Data la lista [3, 1, 4, 1, 5, 9, 2, 6], rimuovi i duplicati mantenendo l'ordine...<br><em>[...continua con gli altri esercizi...]</em></div></div>
  <div class="bubble-wrap user"><div class="bubble user">Perfetto. Aggiungi una sezione bonus con un esercizio che combina entrambe le strutture. E crea anche la griglia di correzione.</div><div class="avatar user">D</div></div>
  <div class="bubble-wrap"><div class="avatar claude">C</div><div class="bubble claude"><strong>Sezione Bonus (10 pt extra)</strong><br>Scrivi una funzione che riceva una lista di dizionari (con chiavi "nome" e "voto") e restituisca un dizionario nome → media dei voti...<br><br><strong>Griglia di correzione</strong><br>Es. 1: correttezza logica (3), sintassi (2) — Tot. 5 pt<br><em>[...griglia completa...]</em></div></div>
</div>
<div class="info-box"><div class="info-box-title">✅ Cosa impari da questo esempio</div><div class="info-box-text">Claude mantiene il contesto <strong>all'interno della stessa conversazione</strong>: sa già che stiamo parlando di Python, 4ª tecnico, 2 ore. Puoi continuare a raffinare con richieste successive, come dialogare con un collega.</div></div>
<div class="info-box yellow"><div class="info-box-title">⚠️ Limite della chat semplice</div><div class="info-box-text">Se domani apri una <strong>nuova chat</strong>, Claude non sa che classe hai, che linguaggio insegni, né il livello degli studenti. Devi ricominciare a fornire il contesto. Per ovviare a questo: usa i <strong>Projects</strong>.</div></div>`,

// 3 — I Projects
`<div class="section-title"><div class="section-num">4</div><h2>I Projects — Memoria persistente per classe</h2></div>
<p>Un <strong>Project</strong> è uno spazio di lavoro permanente in cui Claude ricorda il contesto in tutte le conversazioni. Puoi caricare documenti, dare istruzioni fisse e organizzare il lavoro per classe, materia o UDA.</p>
<div class="step"><div class="step-num">1</div><div><div class="step-title">Clicca su "New Project" nella barra laterale sinistra</div><div class="step-text">Dalla home di claude.ai, nella sidebar trovi il pulsante <em>New Project</em>. Dagli un nome chiaro: <strong>"Classe 4B Informatica"</strong> oppure <strong>"UDA Reti e Protocolli 2024"</strong>.</div></div></div>
<div class="step"><div class="step-num">2</div><div><div class="step-title">Scrivi le istruzioni permanenti (Project Instructions)</div><div class="step-text">Descrivi il contesto che Claude deve ricordare sempre, in ogni conversazione del progetto. È come consegnare un "briefing" una volta sola.</div></div></div>
<div class="code-block"><div class="code-label">📋 ESEMPIO — Istruzioni del Project "Classe 4B Informatica"</div><div class="code-text">Sei un assistente didattico per la mia classe 4B di informatica (istituto tecnico).<br><br><strong>Contesto della classe:</strong><br>- 22 studenti, livello eterogeneo (6 eccellenti, 10 nella media, 6 con difficoltà)<br>- 3 studenti con DSA (dislessia): Luca, Marco, Sara — serve sempre una versione semplificata<br>- Argomenti già affrontati: basi di Python, liste, dizionari, funzioni<br>- Argomento attuale: programmazione orientata agli oggetti (OOP)<br><br><strong>Come rispondermi:</strong><br>- Usa sempre esempi concreti e contestualizzati<br>- Quando crei esercizi, indica il livello (base / intermedio / avanzato)<br>- Per i materiali DSA: frasi brevi, grassetto sulle parole chiave, schema riassuntivo finale</div></div>
<div class="step"><div class="step-num">3</div><div><div class="step-title">Carica i tuoi documenti nel Project</div><div class="step-text">Allega PDF, Word o testo: la tua programmazione annuale, il libro di testo, le linee guida BES dell'istituto. Claude li leggerà e li userà in tutte le conversazioni.</div></div></div>
<div class="step"><div class="step-num">4</div><div><div class="step-title">Inizia a conversare — Claude sa già tutto</div><div class="step-text">Da questo momento, in qualsiasi chat del Project, Claude conosce già la tua classe, i tuoi studenti, il livello e il contesto. Non devi ripetere nulla.</div></div></div>
<div class="chat-area">
  <div class="chat-label"><span class="badge" style="background:#0f766e">ESEMPIO</span> Come cambia l'esperienza con un Project attivo</div>
  <div class="bubble-wrap user"><div class="bubble user">Crea un esercizio introduttivo su classi e oggetti in Python.</div><div class="avatar user">D</div></div>
  <div class="bubble-wrap"><div class="avatar claude">C</div><div class="bubble claude">Ecco un esercizio calibrato per la 4B. Ho preparato <strong>tre versioni</strong>:<br><br>🟢 <strong>Base</strong> — Crea una classe Studente con nome e voto. Aggiungi un metodo che stampa se è promosso.<br>🟡 <strong>Intermedio</strong> — Estendi la classe con una lista di voti e un metodo per calcolare la media.<br>🔴 <strong>Avanzato</strong> — Crea una classe Registro che contiene una lista di Studenti e genera le statistiche.<br><br>📄 <strong>Versione DSA (per Luca, Marco, Sara)</strong><br>Una <strong>classe</strong> è come un modello. Un <strong>oggetto</strong> è una copia di quel modello...<br><em>[testo semplificato con schema visivo]</em></div></div>
</div>
<div class="info-box green"><div class="info-box-title">✅ Cosa è successo in questo esempio?</div><div class="info-box-text">Claude ha risposto senza che tu abbia spiegato nulla: sa già che la classe è in OOP, conosce i tre livelli della 4B e ha preparato autonomamente la versione DSA per i tre studenti specifici. Tutto grazie alle istruzioni del Project.</div></div>`,

// 4 — Funzionalità
`<div class="section-title"><div class="section-num">5</div><h2>Funzionalità chiave per il docente</h2></div>
<div class="feature-block">
  <div class="feature-header"><span class="feature-icon">🎨</span><span class="feature-title">Artifacts — Contenuti interattivi</span></div>
  <p>Quando chiedi a Claude di creare qualcosa di strutturato (un quiz, una tabella, una timeline), può generarlo come Artifact: un contenuto separato, visualizzato in una finestra dedicata, che puoi copiare e usare direttamente.</p>

function goTo(n) {
  current = n;
  document.getElementById('main-content').innerHTML = sections[n] + navFooter();
  document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === n));
  document.querySelector('.content').scrollTop = 0;
}

function navFooter() {
  return `<div class="nav-footer">
    <button class="nav-prev" onclick="goTo(${current-1})" ${current===0?'disabled':''}>← Precedente</button>
    <span class="nav-counter">${current+1} / ${sections.length}</span>
    <button class="nav-next" onclick="goTo(${current+1})" ${current===sections.length-1?'disabled':''}>Successivo →</button>
  </div>`;
}

function copyPrompt(btn) {
  const text = btn.closest('.prompt-box').querySelector('.prompt-text').innerText;
  navigator.clipboard.writeText(text);
  btn.textContent = '✓ Copiato';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copia'; btn.classList.remove('copied'); }, 2000);
}

goTo(0);
</script>
